name: Release (build, scan & push images)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build, scan & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: back
            context: ./back
          - name: front
            context: ./front
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase owner)
        id: img
        run: |
          owner="${{ github.repository_owner }}"
          echo "image=ghcr.io/${owner,,}/comutitre-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally first so we can scan before publishing.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: runner
          load: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.sha }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (gate on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.img.outputs.image }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Push image
        run: |
          docker push ${{ steps.img.outputs.image }}:${{ github.sha }}
          docker push ${{ steps.img.outputs.image }}:latest
