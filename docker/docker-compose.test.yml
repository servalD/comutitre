# Ephemeral PostgreSQL for e2e tests. Uses tmpfs (in-memory, no persistence)
# and an isolated port (5433) so it can run alongside the dev database.
#
#   docker compose -f docker/docker-compose.test.yml up -d
#   pnpm --dir back test:e2e
#   docker compose -f docker/docker-compose.test.yml down
services:
  db:
    image: postgres:16-alpine
    container_name: comutitre_db_test
    environment:
      POSTGRES_DB: comutitre_test
      POSTGRES_USER: comutitre_test
      POSTGRES_PASSWORD: comutitre_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U comutitre_test -d comutitre_test']
      interval: 2s
      timeout: 3s
      retries: 15
