# Docker Swarm production stack.
#
#   # 1. Create the secrets once on the manager node:
#   printf '%s' "$(openssl rand -base64 32)" | docker secret create comutitre_app_jwt_secret -
#   printf '%s' 'your-strong-db-password'   | docker secret create comutitre_db_password -
#
#   # 2. Deploy (BACK_IMAGE / FRONT_IMAGE point at the pushed GHCR images):
#   docker stack deploy -c docker/stack.prod.yml comutitre
#
# Secrets are mounted as files; the app reads them via the *_FILE convention.
version: '3.9'

services:
  migrate:
    image: ${BACK_IMAGE:-ghcr.io/your-org/comutitre-back:latest}
    command: node node_modules/typeorm/cli.js migration:run -d dist/infrastructure/database/typeorm.config.js
    environment:
      NODE_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: '5432'
      DATABASE_NAME: comutitre
      DATABASE_USER: comutitre
      DATABASE_PASSWORD_FILE: /run/secrets/comutitre_db_password
    secrets:
      - comutitre_db_password
    networks:
      - backend
    deploy:
      restart_policy:
        condition: none
      replicas: 1

  back:
    image: ${BACK_IMAGE:-ghcr.io/your-org/comutitre-back:latest}
    environment:
      NODE_ENV: production
      PORT: '3000'
      CORS_ORIGIN: ${CORS_ORIGIN:-https://comutitre.example.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://comutitre.example.com}
      DATABASE_HOST: db
      DATABASE_PORT: '5432'
      DATABASE_NAME: comutitre
      DATABASE_USER: comutitre
      DATABASE_PASSWORD_FILE: /run/secrets/comutitre_db_password
      APP_JWT_SECRET_FILE: /run/secrets/comutitre_app_jwt_secret
      APP_JWT_EXPIRES_IN: 1h
      DYNAMIC_ENVIRONMENT_ID: ${DYNAMIC_ENVIRONMENT_ID}
      FRANCECONNECT_MODE: ${FRANCECONNECT_MODE:-live}
      FRANCECONNECT_CLIENT_ID: ${FRANCECONNECT_CLIENT_ID}
      FRANCECONNECT_CLIENT_SECRET: ${FRANCECONNECT_CLIENT_SECRET}
      FRANCECONNECT_ISSUER_URL: ${FRANCECONNECT_ISSUER_URL}
      FRANCECONNECT_REDIRECT_URI: ${FRANCECONNECT_REDIRECT_URI}
    secrets:
      - comutitre_db_password
      - comutitre_app_jwt_secret
    ports:
      - '3000:3000'
    networks:
      - backend
      - frontend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  front:
    image: ${FRONT_IMAGE:-ghcr.io/your-org/comutitre-front:latest}
    ports:
      - '8080:8080'
    networks:
      - frontend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: comutitre
      POSTGRES_USER: comutitre
      POSTGRES_PASSWORD_FILE: /run/secrets/comutitre_db_password
    secrets:
      - comutitre_db_password
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U comutitre -d comutitre']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

secrets:
  comutitre_db_password:
    external: true
  comutitre_app_jwt_secret:
    external: true

networks:
  frontend:
    driver: overlay
  backend:
    driver: overlay

volumes:
  postgres_prod_data:
