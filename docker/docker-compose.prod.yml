# Production stack (single host). Images are built & pushed by CI to GHCR.
# Set BACK_IMAGE / FRONT_IMAGE (e.g. ghcr.io/<owner>/comutitre-back:<sha>) and
# provide a populated .env.prod before running.
#   docker compose -f docker/docker-compose.prod.yml up -d
services:
  # Applies pending DB migrations once, then exits. The app waits for it.
  migrate:
    image: ${BACK_IMAGE:-ghcr.io/your-org/comutitre-back:latest}
    container_name: comutitre_migrate_prod
    command: node node_modules/typeorm/cli.js migration:run -d dist/infrastructure/database/typeorm.config.js
    env_file:
      - ../.env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  back:
    image: ${BACK_IMAGE:-ghcr.io/your-org/comutitre-back:latest}
    container_name: comutitre_back_prod
    ports:
      - '3000:3000'
    env_file:
      - ../.env.prod
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always

  front:
    image: ${FRONT_IMAGE:-ghcr.io/your-org/comutitre-front:latest}
    container_name: comutitre_front_prod
    ports:
      - '8080:8080'
    depends_on:
      - back
    restart: always

  db:
    image: postgres:16-alpine
    container_name: comutitre_db_prod
    env_file:
      - ../.env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_prod_data:
